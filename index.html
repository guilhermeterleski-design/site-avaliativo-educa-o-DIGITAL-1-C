<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportFlow Ultra | The Next Level</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="loading">
    <div id="loader" class="loader" aria-hidden="true"></div>

    <header class="glass-header">
        <nav class="nav-container">
            <a href="#" class="logo" aria-label="SportFlow Home">SF<span>ULTRA</span></a>
            <div class="actions">
                <div class="a11y-suite" role="group" aria-label="Ferramentas de acessibilidade">
                    <button id="contrast-toggle" title="Alto Contraste">🌓</button>
                    <button id="font-dec" title="Diminuir Fonte">A-</button>
                    <button id="font-inc" title="Aumentar Fonte">A+</button>
                </div>
                <button class="btn-cta-nav">Join Now</button>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="hero-grid reveal">
            <div class="hero-text">
                <span class="badge">Performance 2026</span>
                <h1>Transforme dados em <mark>músculos</mark>.</h1>
                <p>A primeira plataforma que integra biomecânica avançada com feedback em tempo real.</p>
            </div>
            <div class="hero-visual" role="img" aria-label="Visualização de performance esportiva">
                <div class="data-sphere"></div>
            </div>
        </section>

        <section class="stats-bar" id="stats-container">
            </section>

        <section class="section-container" aria-labelledby="planos-title">
            <h2 id="planos-title" class="reveal">Planos Adaptativos</h2>
            <div class="tabs-wrapper reveal">
                <div role="tablist" class="tab-triggers" id="tab-list"></div>
                <div id="tab-content" class="tab-panel-active"></div>
            </div>
        </section>

        <section class="section-container bg-offset">
            <div class="grid-cards" id="main-grid">
                </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>SportFlow Ultra &copy; 2026 | Built for Everyone.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
